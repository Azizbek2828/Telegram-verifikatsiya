<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Channel Verification</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
  padding:40px;
}
input{
  padding:12px;
  width:250px;
  border-radius:8px;
  border:none;
  margin-top:20px;
}
button{
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
}
#result{
  margin-top:25px;
  font-size:18px;
}
</style>

</head>
<body>

<h2>Telegram Channel Verification</h2>

<input id="channel" placeholder="@kanal_username">
<br>
<button onclick="verify()">VERIFY CHANNEL</button>

<div id="result"></div>

<script type="module">

// Firebase import va konfiguratsiyasi
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAxZ-mSgJhuTdGcH3T4oJym3qjGso71keM",
  authDomain: "user1111-c84a0.firebaseapp.com",
  databaseURL: "https://user1111-c84a0-default-rtdb.firebaseio.com",
  projectId: "user1111-c84a0",
  storageBucket: "user1111-c84a0.firebasestorage.app",
  messagingSenderId: "901723757936",
  appId: "1:901723757936:web:d1f18c83c721edfb0c03b5",
  measurementId: "G-QLE9866NEY"
};

// Firebase boshlash
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);   // ❗ db endi global scope’da

// Bot token va ID
const BOT_TOKEN = "8653382126:AAF0NTKY1JaJoveDIUwfP0ovaGMexsUDZ78";
const BOT_ID = "8653382126";

window.verify = async function(){
  try{
    let username = document.getElementById("channel").value.replace("@","")
    if(!username){
      document.getElementById("result").innerHTML="❌ Username kiriting"
      return
    }

    document.getElementById("result").innerHTML="⏳ Tekshirilmoqda..."

    // Telegram API orqali bot adminligini tekshirish
    let url = `https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=@${username}&user_id=${BOT_ID}`
    let response = await fetch(url)
    let data = await response.json()

    console.log(data)

    if(data.ok && data.result.status=="administrator"){
      // Firebase ga yozish
      await set(ref(db,"channels/"+username),{
        status:"verified",
        icon:"⭐",
        date:Date.now()
      })
      document.getElementById("result").innerHTML="⭐ VERIFIED CHANNEL"
    }else{
      document.getElementById("result").innerHTML="❌ Bot kanalga admin emas"
    }

  }catch(e){
    document.getElementById("result").innerHTML="❌ Xatolik: "+e
  }
}

</script>

</body>
</html>
