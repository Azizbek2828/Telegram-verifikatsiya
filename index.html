<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Channel Verification</title>

<!-- Telegram Web App JS -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Firebase JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔹 Firebase konfiguratsiyasi
const firebaseConfig = {
  apiKey: "AIzaSyAxZ-mSgJhuTdGcH3T4oJym3qjGso71keM",
  authDomain: "user1111-c84a0.firebaseapp.com",
  databaseURL: "https://user1111-c84a0-default-rtdb.firebaseio.com",
  projectId: "user1111-c84a0",
  storageBucket: "user1111-c84a0.firebasestorage.app",
  messagingSenderId: "901723757936",
  appId: "1:901723757936:web:d1f18c83c721edfb0c03b5",
  measurementId: "G-QLE9866NEY"
};

// 🔹 Firebase boshlash
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔹 Bot token va ID
const BOT_TOKEN = "8653382126:AAF0NTKY1JaJoveDIUwfP0ovaGMexsUDZ78"; // BotFather orqali oling
const BOT_ID = "8653382126";       // getMe orqali oling

// 🔹 Kanalni tekshirish funksiyasi
window.verify = async function() {
  const usernameInput = document.getElementById("channel");
  const resultDiv = document.getElementById("result");
  const username = usernameInput.value.replace("@","").trim();

  if(!username){
    resultDiv.innerHTML = "❌ Iltimos kanal username kiriting!";
    return;
  }

  resultDiv.innerHTML = "⏳ Tekshirilmoqda...";

  try{
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=@${username}&user_id=${BOT_ID}`;
    const response = await fetch(url);
    const data = await response.json();
    console.log(data);

    if(data.ok && data.result.status === "administrator"){
      resultDiv.innerHTML = "⭐ VERIFIED CHANNEL";

      // Firebase ga yozish
      await set(ref(db,"channels/"+username),{
        status:"verified",
        icon:"⭐",
        date:Date.now()
      });

    }else{
      resultDiv.innerHTML = "❌ Bot kanalga admin emas";
    }

  }catch(e){
    resultDiv.innerHTML = "❌ Xatolik: "+e;
  }
}
</script>

<style>
/* 🔹 Asosiy dizayn */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: #fff;
  padding: 50px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 🔹 Sarlavha */
h2 {
  font-size: 2rem;
  margin-bottom: 30px;
  background: linear-gradient(90deg,#22c55e,#3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 🔹 Input */
input {
  padding: 15px 20px;
  width: 300px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  margin-bottom: 20px;
  outline: none;
}

/* 🔹 Tugma */
button {
  padding: 15px 30px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg,#22c55e,#3b82f6);
  color: white;
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* 🔹 Natija qutisi */
#result {
  margin-top: 25px;
  font-size: 18px;
  font-weight: bold;
  min-height: 24px;
  transition: all 0.3s;
}

/* 🔹 Responsive */
@media(max-width:400px){
  input{width: 90%;}
  button{width: 90%;}
}
</style>
</head>

<body>

<h2>Telegram Channel Verification</h2>

<input id="channel" placeholder="@kanal_username">
<br>
<button onclick="verify()">VERIFY CHANNEL</button>

<div id="result"></div>

</body>
</html>
